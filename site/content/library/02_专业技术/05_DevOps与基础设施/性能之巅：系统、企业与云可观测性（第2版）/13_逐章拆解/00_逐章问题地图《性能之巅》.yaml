    label: "第1章 导论\n先把问题定义对"
    type: process
    module: kickoff
    size: medium

  - id: ch02
    label: "第2章 方法论\n决定起手顺序"
    type: process
    module: kickoff
    size: medium

  - id: ch03
    label: "第3章 操作系统\n建立全栈坐标"
    type: process
    module: orientation
    size: medium

  - id: ch05
    label: "第5章 应用\n先分是不是应用侧"
    type: process
    module: orientation
    size: medium

  - id: ch04
    label: "第4章 可观测性工具\n先判断缺哪种证据"
    type: process
    module: tools
    size: medium

  - id: ch06
    label: "第6章 CPU\n先证伪真是CPU问题"
    type: service
    module: resources
    size: medium

  - id: ch07
    label: "第7章 内存\n先分占用和压力"
    type: service
    module: resources
    size: medium

  - id: ch08
