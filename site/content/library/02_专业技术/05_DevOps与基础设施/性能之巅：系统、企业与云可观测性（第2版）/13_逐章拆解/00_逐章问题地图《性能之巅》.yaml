meta:
  profile: engineering-review
  theme: tech-blue
  layout: hierarchical
  canvas: auto
  routing: orthogonal
  title: "《性能之巅》逐章问题地图"
  description: "按起手问题、资源域分流、工具切换、环境修正和案例回放组织《性能之巅》的逐章拆解关系。"

modules:
  - id: kickoff
    label: 起手与框架
  - id: orientation
    label: 分层与分流
  - id: resources
    label: 资源域下钻
  - id: tools
    label: 证据与工具升级
  - id: validation
    label: 环境修正与回放

nodes:
