name: Deploy Blog to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: astro-site/package-lock.json

      - name: Install Astro dependencies
        working-directory: ./astro-site
        run: npm ci

      - name: Check frontmatter
        run: python3 scripts/check-frontmatter.py

      - name: Check shortcodes
        run: python3 scripts/check-shortcodes.py

      - name: Check markdown structure
        run: python3 scripts/check-markdown-structure.py

      - name: Check writing patterns
        run: python3 scripts/check-writing-patterns.py

      - name: Check Astro build
        run: python3 scripts/check-astro-build.py

      - name: Pack Astro dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          tar -C astro-site -czf /tmp/astro-site-dist.tgz dist

      - name: Upload Astro dist artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: astro-site-dist
          path: /tmp/astro-site-dist.tgz
          if-no-files-found: error
          retention-days: 1

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"

      - name: Download Astro dist artifact
        uses: actions/download-artifact@v5
        with:
          name: astro-site-dist
          path: /tmp/deploy-artifact

      - name: Unpack Astro dist
        run: |
          mkdir -p astro-site
          tar -C astro-site -xzf /tmp/deploy-artifact/astro-site-dist.tgz

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing required secrets: CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$PROJECT_NAME" ]; then
            PROJECT_NAME="book"
          fi
          npx wrangler pages project create "$PROJECT_NAME" --production-branch main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "$PROJECT_NAME" ]; then
            PROJECT_NAME="book"
          fi
          npx wrangler pages deploy ./astro-site/dist --project-name "$PROJECT_NAME" --branch "$GITHUB_REF_NAME"
