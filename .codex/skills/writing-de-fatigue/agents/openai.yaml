interface:
  display_name: "减疲劳重写"
  short_description: "给现有中文正文做通俗易懂重写：词不让读者翻译，句不让读者读两遍，段不让读者走神退出。不改判断，不加观点。"
  default_prompt: "使用 $writing-de-fatigue 重写这篇中文正文。按词、句、段三层做复合诊断，三层都中的段落整段重写，只中一两层的局部微调。词层：砍书面虚词、名词化空壳、造词和隐喻动词。句层：修饰前置不超过2层，的字链不超过2个，因果链一句一环，方向变化一句一次，不是…而是…全篇不超过3次，重心在主句不在从句，指代明确。段层：并列项不超过3个，防御层最多一层，破节奏锁死，补处境入口。不要发明新观点，不要改变槽位边界，不要把原文改成另一套模板。"
