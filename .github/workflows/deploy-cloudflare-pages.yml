name: Deploy Blog to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: astro-site/package-lock.json

      - name: Install Astro dependencies
        working-directory: ./astro-site
        run: npm ci

      - name: Build Astro site
        working-directory: ./astro-site
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing required secrets: CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$PROJECT_NAME" ]; then
            PROJECT_NAME="book"
          fi
          npx wrangler pages project create "$PROJECT_NAME" --production-branch main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "$PROJECT_NAME" ]; then
            PROJECT_NAME="book"
          fi
          npx wrangler pages deploy ./astro-site/dist --project-name "$PROJECT_NAME" --branch "$GITHUB_REF_NAME"
