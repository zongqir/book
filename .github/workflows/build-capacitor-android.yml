name: Build Android Release

on:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: astro-site/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Install Astro dependencies
        working-directory: ./astro-site
        run: npm ci

      - name: Build Astro site bundle
        working-directory: ./astro-site
        run: npm run check:site:app

      - name: Sync Capacitor Android
        working-directory: ./astro-site
        run: npm run sync:android

      - name: Build debug APK
        working-directory: ./astro-site/android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Prepare release asset
        id: asset
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_PATH=$(find astro-site/android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi
          ASSET_NAME="book-${TAG_NAME}-android-debug.apk"
          RELEASE_NOTES="/tmp/release-notes.txt"
          cp "$APK_PATH" "/tmp/${ASSET_NAME}"
          {
            echo "读书库 Android 调试包"
            echo
            echo "- Tag: ${TAG_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
          } > "$RELEASE_NOTES"
          echo "asset_path=/tmp/${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_notes=${RELEASE_NOTES}" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: book-android-debug-apk
          path: ${{ steps.asset.outputs.asset_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "Android ${GITHUB_REF_NAME}" \
              --notes-file "${{ steps.asset.outputs.release_notes }}"

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.asset.outputs.asset_path }}#${{ steps.asset.outputs.asset_name }}" \
            --clobber

      - name: Upload APK to Cloudflare R2
        if: ${{ vars.CLOUDFLARE_R2_ANDROID_BUCKET != '' && vars.ANDROID_APP_DOWNLOAD_BASE_URL != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.CLOUDFLARE_R2_ANDROID_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ vars.ANDROID_APP_DOWNLOAD_BASE_URL }}
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
          ASSET_NAME: ${{ steps.asset.outputs.asset_name }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing Cloudflare credentials"
            exit 1
          fi

          BASE_URL="${R2_PUBLIC_BASE_URL%/}"
          VERSIONED_KEY="android/${TAG_NAME}/${ASSET_NAME}"
          LATEST_KEY="android/latest/book-android-latest-debug.apk"
          LATEST_JSON_KEY="android/latest/latest.json"
          METADATA_PATH="/tmp/android-latest.json"

          VERSIONED_URL="${BASE_URL}/${VERSIONED_KEY}"
          LATEST_URL="${BASE_URL}/${LATEST_KEY}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"

          cat > "$METADATA_PATH" <<EOF
          {
            "tag": "${TAG_NAME}",
            "commit": "${COMMIT_SHA}",
            "asset_name": "${ASSET_NAME}",
            "release_url": "${RELEASE_URL}",
            "versioned_url": "${VERSIONED_URL}",
            "latest_url": "${LATEST_URL}",
            "published_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          npx wrangler r2 object put "${R2_BUCKET}/${VERSIONED_KEY}" --remote --file="${ASSET_PATH}" --content-type="application/vnd.android.package-archive"
          npx wrangler r2 object put "${R2_BUCKET}/${LATEST_KEY}" --remote --file="${ASSET_PATH}" --content-type="application/vnd.android.package-archive"
          npx wrangler r2 object put "${R2_BUCKET}/${LATEST_JSON_KEY}" --remote --file="${METADATA_PATH}" --content-type="application/json"
