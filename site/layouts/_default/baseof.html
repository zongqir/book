<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="theme-color" content="#2f5b7c">
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
  <link rel="manifest" href="{{ "manifest.webmanifest" | relURL }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }} RSS" href="{{ "/index.xml" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
{{ $isLibrary := hasPrefix .RelPermalink ("/library/" | relURL) }}
<body class="{{ if .IsPage }}page-single{{ else }}page-list{{ end }}{{ if $isLibrary }} is-library{{ end }}">
  <div class="page-frame">
    <header class="site-header-wrap">
        <div class="site-header shell">
        <div class="identity">
          <a class="brand" href="{{ "/" | relURL }}">
            <span>{{ site.Title }}</span>
          </a>
          <span class="tagline">个人读书与研究资料库</span>
        </div>
        <nav class="top-nav" aria-label="主导航">
          <a class="nav-pill{{ if .IsHome }} is-active{{ end }}" href="{{ "/" | relURL }}">首页</a>
          {{ if .IsHome }}
            <a class="nav-pill nav-pill--subtle" href="#home-tools">随机入口</a>
            <a class="nav-pill nav-pill--subtle" href="#home-categories">分类导航</a>
          {{ end }}
          <a class="nav-pill{{ if $isLibrary }} is-active{{ end }}" href="{{ "/library/" | relURL }}">目录</a>
        </nav>
      </div>
    </header>
  </div>
  <main class="container shell">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer shell">
    <p>Book Lab 用来沉淀阅读判断、专题研究和结构化笔记。</p>
    <p class="site-footer-meta">{{ now.Format "2006" }} · 个人读书与研究资料库</p>
  </footer>
  <script>
    (function () {
      var mq = window.matchMedia("(max-width: 760px)");
      var sync = function () {
        document.querySelectorAll("details[data-mobile-collapsible]").forEach(function (el) {
          el.open = !mq.matches;
        });
      };
      sync();
      if (typeof mq.addEventListener === "function") {
        mq.addEventListener("change", sync);
      } else if (typeof mq.addListener === "function") {
        mq.addListener(sync);
      }
    })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("{{ "sw.js" | relURL }}");
      });
    }
  </script>
</body>
</html>
