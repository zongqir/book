    type: service
    module: resources
    size: medium

  - id: ch09
    label: "第9章 磁盘\n先分服务时间和排队"
    type: service
    module: resources
    size: medium

  - id: ch10
    label: "第10章 网络\n先分层再看双边证据"
    type: service
    module: resources
    size: medium

  - id: ch13
    label: "第13章 perf\n采样热点与PMC"
    type: service
    module: tools
    size: medium

  - id: ch14
